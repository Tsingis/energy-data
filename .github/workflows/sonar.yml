name: sonar
on:
  push:
    branches:
      - main
    paths:
      - "server/src/**"
      - "server/tests/**"
      - "server/pyproject.toml"
      - "server/uv.lock"
      - "client/client/src/**"
      - "client/client/tests/**"
      - "client/client/config/**"
      - "client/package*.json"
      - "**/Dockerfile*"
      - ".github/workflows/sonar.yml"
  pull_request:
    branches:
      - main
    paths:
      - "server/src/**"
      - "server/tests/**"
      - "server/pyproject.toml"
      - "server/uv.lock"
      - "client/client/src/**"
      - "client/client/tests/**"
      - "client/client/config/**"
      - "client/package*.json"
      - "**/Dockerfile*"
      - ".github/workflows/sonar.yml"
  schedule:
    - cron: "0 21 * * 0"
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
